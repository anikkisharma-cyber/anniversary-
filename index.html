<!DOCTYPE HTML>

<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Happy Fourth Anniversary</title>

<link rel="stylesheet" type="text/css" href="format.css">

<style>
/* ⭐ BACKGROUND CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* 💖 BODY */
body {
  margin: 0;
  padding: 0;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* 💌 MAIN CONTENT FIX */
#imgTxt, #heartTxt, #content, #typeDiv {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 90%;
  margin: 20px auto;
}

/* 🖼 IMAGE FIX */
#img {
  width: 250px;
  max-width: 90%;
  margin-top: 20px;
  border-radius: 15px;
}

/* 💬 TEXT FIX */
#Txt, #tmp, #txt1, #txt2 {
  display: block;
  word-wrap: break-word;
  line-height: 1.6;
  font-size: 18px;
}

/* ❤️ BUTTON CENTER */
#heart {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

/* ⏳ TIMER FIX */
#content {
  margin-top: 30px;
}

/* 📱 RESPONSIVE */
@media (max-width: 600px) {
  #img {
    width: 180px;
  }

  #Txt, #tmp, #txt1, #txt2 {
    font-size: 16px;
  }
}
</style>

</head>

<body>

<!-- 🎵 MUSIC -->

<audio autoplay loop>
  <source src="music/music.mp3" type="audio/mpeg">
</audio>

<!-- ⭐ BACKGROUND -->

<canvas></canvas>

<!-- 💖 IMAGE + TEXT -->

<div id="imgTxt">
  <span id="Txt"></span><br />
  <span id="tmp"></span>
  <img id="img" src="">
</div>

<!-- ❤️ CLICK HEART -->

<div id="heartTxt">
  <span id="clickMe">Click!</span>
  <div id="heart">
    <button id="button" onclick="play()"></button>
  </div>
</div>

<!-- ⏳ TIMER -->

<div id="content">
  <h2 id="together">We have been together</h2>
  <div id="timer">
    <b id="d"></b> Days 
    <b id="h"></b> Hours
    <b id="m"></b> Minutes
    <b id="s"></b> Seconds
  </div>
</div>

<!-- 💌 TYPING TEXT -->

<div id="typeDiv">
  <span id="txt1"></span><br>
  <span id="txt2"></span>
</div>

<script>
var ok = 0;
var flag = 1;

/* 📸 MAKE SURE PATH IS CORRECT */

"images/pic13.jpeg","images/pic14.jpeg","images/pic15.jpeg","images/pic16.jpeg"

  function play() {
document.getElementById("heartTxt").style.display = "none";

let i = 0;

function showNext() {
if (i < imageArray.length) {
document.getElementById("img").src = imageArray[i];
document.getElementById("Txt").innerHTML = txtArray[i];

setTimeout(showNext, 2000); // change speed here
}
}

showNext();
}


var imageIndex = 0;

/* 💖 YOUR TEXT (kept your vibe) */
var txtArray = [

"But mostly… the best thing that ever happened to me",
"Thank you for staying, for loving me, for choosing me",
"I’m so proud of us",
"And I can’t wait for everything that’s coming ahead",
"Still stuck with me 😏",
"Happy 4 years, my love ❤️",
"I love you, Ujjwal"
];

var len = imageArray.length;
var t = 0;

<script src="date.js"></script>

<script src="stars.js"></script>

<script src="typeWriter.js"></script>

<script src="playImg.js"></script>

</body>
</html>
