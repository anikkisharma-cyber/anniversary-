<!DOCTYPE HTML>

<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Happy Fourth Anniversary</title>

<link rel="stylesheet" type="text/css" href="format.css">

<style>

/* ⭐ BACKGROUND */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* 💖 BODY */
body {
  margin: 0;
  padding: 0;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* 💌 IMAGE + TEXT CENTER */
#imgTxt {
  position: relative;
  z-index: 2;
  text-align: center;
  margin-top: 80px;
}

/* 🖼 IMAGE */
#img {
  width: 250px;
  max-width: 90%;
  margin-top: 20px;
  border-radius: 15px;
}

/* 💬 TEXT */
#Txt, #tmp, #txt1, #txt2 {
  display: block;
  word-wrap: break-word;
  line-height: 1.6;
  font-size: 18px;
  max-width: 90%;
  margin: auto;
}

/* ❤️ HEART BUTTON */
#heartTxt {
  position: fixed;
  bottom: 120px;
  width: 100%;
  text-align: center;
  z-index: 3;
}

#heart {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

#button {
  width: 70px;
  height: 70px;
  background-color: red;
  border: none;
  transform: rotate(45deg);
  position: relative;
  cursor: pointer;
}

#button::before,
#button::after {
  content: "";
  width: 70px;
  height: 70px;
  background-color: red;
  border-radius: 50%;
  position: absolute;
}

#button::before {
  top: -35px;
  left: 0;
}

#button::after {
  left: -35px;
  top: 0;
}

/* ⏳ TIMER */
#content {
  position: relative;
  z-index: 2;
  margin-top: 40px;
  text-align: center;
}

/* 💌 TYPE TEXT */
#typeDiv {
  position: relative;
  z-index: 2;
  text-align: center;
  margin-top: 30px;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
  #img {
    width: 180px;
  }

  #Txt, #txt1, #txt2 {
    font-size: 16px;
  }
}

</style>

</head>

<body>

<!-- 🎵 MUSIC -->

<audio autoplay loop>
  <source src="music/music.mp3" type="audio/mpeg">
</audio>

<!-- ⭐ BACKGROUND -->

<canvas></canvas>

<!-- 💖 IMAGE + TEXT -->

<div id="imgTxt">
  <span id="Txt"></span><br />
  <span id="tmp"></span>
  <img id="img" src="">
</div>

<!-- ❤️ HEART -->

<div id="heartTxt">
  <span id="clickMe">Click ❤️</span>
  <div id="heart">
    <button id="button" onclick="play()"></button>
  </div>
</div>

<!-- ⏳ TIMER -->

<div id="content">
  <h2 id="together">We have been together</h2>
  <div id="timer">
    <b id="d"></b> Days 
    <b id="h"></b> Hours
    <b id="m"></b> Minutes
    <b id="s"></b> Seconds
  </div>
</div>

<!-- 💌 TYPE TEXT -->

<div id="typeDiv">
  <span id="txt1"></span><br>
  <span id="txt2"></span>
</div>

<script>
var myImage = document.getElementById("img");
var myTxt = document.getElementById("Txt");

/* 📸 IMAGE PATH (make sure folder is correct) */
var imageArray = [
"pic1.jpeg","pic2.jpeg","pic3.jpeg","pic4.jpeg",
"pic5.jpeg","pic6.jpeg","pic7.jpeg","pic8.jpeg",
"pic9.jpeg","pic10.jpeg","pic11.jpeg","pic12.jpeg",
"pic13.jpeg","pic14.jpeg","pic15.jpeg","pic16.jpeg"
];

/* 💖 TEXT */
var txtArray = [
"Hi Ujjwal ❤️",
"I still remember how everything started with you…",
"From random conversations to becoming my favourite person",
"I didn’t realize when you became my habit",
"4 years… and I still choose you every single day",
"Long distance hasn’t been easy for us",
"But somehow, we made it work… together",
"You’ve been my comfort, my safe place, my home",
"And yes… sometimes my headache too 😌",
"But mostly… the best thing that ever happened to me",
"Thank you for staying, for loving me, for choosing me",
"I’m so proud of us",
"And I can’t wait for everything that’s coming ahead",
"Still stuck with me 😏",
"Happy 4 years, my love ❤️",
"I love you, Ujjwal"
];

/* ❤️ CLICK FUNCTION */
function play() {
  document.getElementById("heartTxt").style.display = "none";

  let i = 0;

  function showNext() {
    if (i < imageArray.length) {
      myImage.src = imageArray[i];
      myTxt.innerHTML = txtArray[i];
      i++;
      setTimeout(showNext, 2000);
    }
  }

  showNext();
}
</script>

<!-- ✅ KEEP THESE -->

<script src="date.js"></script>

<script src="stars.js"></script>

<script src="typeWriter.js"></script>

<!-- ❌ REMOVE THIS (you don’t have it) -->

<!-- <script src="playImg.js"></script> -->

</body>
</html>
